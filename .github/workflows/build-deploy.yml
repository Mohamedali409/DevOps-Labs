name: build-deploy

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: echo "Hello from build job" > app.text

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-file
          path: app.txt
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app.file

      - name: Read file
        run: cat app.text
